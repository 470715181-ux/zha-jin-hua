<script>"use strict";
// ===== Pusher 通信层 =====
var PUSHER_KEY='ad9a4fbd88c201b82167';
var PUSHER_CLUSTER='ap1';
var WORKER_URL='https://zha-jin-hua-relay.470715181.workers.dev';
var pusher=null,pusherChannel=null;


// === Pusher Client Events Auth (browser-side, no server) ===
var PUSHER_SECRET_CE='3d698a6bf2884d2ade00';

function ceBytesToHex(buf){
  var arr=new Uint8Array(buf);
  var hex='';
  for(var i=0;i<arr.length;i++){
    var h=arr[i].toString(16);
    if(h.length<2)h='0'+h;
    hex+=h;
  }
  return hex;
}

async function ceHmacHex(key,msg){
  var enc=new TextEncoder();
  var keyObj=await crypto.subtle.importKey('raw',enc.encode(key),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  var sig=await crypto.subtle.sign('HMAC',keyObj,enc.encode(msg));
  return ceBytesToHex(sig);
}

// 自定义 Pusher authorizer：本地算签名，不发 HTTP
function makeLocalAuthorizer(channel){
  return {
    authorize:function(socketId,callback){
      var stringToSign=socketId+':'+channel.name;
      ceHmacHex(PUSHER_SECRET_CE,stringToSign).then(function(sig){
        callback(null,{auth:PUSHER_KEY+':'+sig});
      }).catch(function(e){
        callback(new Error('local auth fail: '+e.message),null);
      });
    }
  };
}

function pInit(cb){
  if(pusher&&pusher.connection.state==='connected'){if(cb)cb();return}
  if(typeof Pusher==='undefined'){toast('Pusher SDK未加载');return}
  pusher=new Pusher(PUSHER_KEY,{cluster:PUSHER_CLUSTER,forceTLS:true,channelAuthorization:{customHandler:function(params,callback){
    var stringToSign=params.socketId+':'+params.channelName;
    ceHmacHex(PUSHER_SECRET_CE,stringToSign).then(function(sig){
      callback(null,{auth:PUSHER_KEY+':'+sig});
    }).catch(function(e){callback(new Error('local auth fail: '+e.message),null)});
  }}});
  pusher.connection.bind('connected',function(){
    if(!myId)myId='c_'+Math.random().toString(36).substring(2,12);
    syC('Pusher已连接 socket='+pusher.connection.socket_id);
    
    if(cb)cb();
  });
  pusher.connection.bind('error',function(e){console.error('Pusher err',e);syC('❌ Pusher错误:'+(e.error?e.error.data?e.error.data.message:e.error.message:'unknown'))});
  pusher.connection.bind('state_change',function(s){syC('状态:'+s.previous+'→'+s.current);
    if(s.current==='connected'&&s.previous!=='connected'&&G&&!isH){
      setTimeout(function(){if(G&&!isH)pSend({t:'reqSync',n:myN,from:myId})},500);
    }
  });
}

function pJoinChannel(roomCode,onReady){
  if(pusherChannel){try{pusher.unsubscribe(pusherChannel.name)}catch(e){}}
  pusherChannel=pusher.subscribe('private-zjh-'+roomCode);pusherChannel.bind('pusher:subscription_error',function(s){syC('❌ 订阅失败 status='+(s&&s.status||'unknown'))});
  // 同时监听 'msg'(server推送) 和 'client-msg'(客户端triggered)
  function _onMsg(data){
    
    var d;
    if(typeof data==='string'){try{d=JSON.parse(data)}catch(err){return}}else{d=data}
    if(!d){return}
    if(d._from===myId){return}
    if(d._to&&d._to!==myId){return}
    
    oM(d,d._from||'unknown');
  }
  pusherChannel.bind('msg',_onMsg);

  }
